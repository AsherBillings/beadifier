<div fxLayout="column" fxLayoutGap="1em">
    <div fxLayout="row" fxLayoutAlign="start center" fxLayoutGap="1em">
        <mat-form-field fxFlex>
            <mat-select
                multiple
                aria-label="palettes"
                placeholder="Palettes"
                [(ngModel)]="configuration.palettes"
                name="palettes"
                (selectionChange)="callback()"
                [compareWith]="paletteEquality"
            >
                <mat-option
                    *ngFor="let palette of availablePalettes | async"
                    [value]="palette"
                >
                    {{ palette.name }}
                </mat-option>
            </mat-select>
        </mat-form-field>
    </div>
    <div
        fxLayout="row wrap"
        *ngFor="let palette of configuration.palettes"
        fxLayoutAlign="start center"
    >
        <div fxFlex="100%" style="margin-bottom: 1em">
            <ng-container *ngIf="getPresets(palette.name) | async as presets">
                <mat-form-field *ngIf="presets.length > 0">
                    <mat-select
                        placeholder="Presets"
                        [(ngModel)]="selectedPresets[palette.name]"
                        (selectionChange)="applyPreset(palette, $event.value)"
                    >
                        <mat-option [value]="''">None</mat-option>
                        <mat-option *ngFor="let preset of presets" [value]="preset.name">
                            {{ preset.name }}
                        </mat-option>
                    </mat-select>
                </mat-form-field>
            </ng-container>
        </div>
        <div
            fxFlex.xs="50%"
            fxFlex.sm="33%"
            fxFlex.md="25%"
            fxFlex.lg="20%"
            fxFlex.xl="14.28%"
            *ngFor="let entry of palette.entries"
        >
            <app-palette-entry
                [entry]="entry"
                (onToggleCallback)="callback()"
            ></app-palette-entry>
        </div>
        <mat-divider style="margin-top: 1em" [inset]="true"></mat-divider>
    </div>
    <div fxLayout="row wrap" fxLayoutAlign="center center">
        <div class="mat-small mat-caption">
            Something wrong about colors ? Please fill an
            <a
                href="https://github.com/maxcleme/beadcolors/issues/new"
                target="blank"
                >issue</a
            >.
        </div>
    </div>
</div>
